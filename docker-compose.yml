# ─────────────────────────────────────────────────────────────────
# ConnectSphere – Local Development Docker Compose
# Start everything:  docker-compose up -d
# Stop everything:   docker-compose down
# View logs:         docker-compose logs -f <service-name>
# ─────────────────────────────────────────────────────────────────

services:

  eureka-server:
    build:
      context: .
      dockerfile: ./eureka-server/Dockerfile
    container_name: cs-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"

    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  # ── Infrastructure ──────────────────────────────────────────────

  mysql:
    image: mysql:8.3
    container_name: cs-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: cs-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: cs-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 5

  # -- Code quality ---------------------------------------------------------
  # Optional local SonarQube stack. It is behind profiles so the normal
  # application stack and existing service images are not affected.

  sonar-db:
    image: postgres:16-alpine
    profiles:
      - quality
    container_name: cs-sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: sonarqube
    volumes:
      - sonarqube-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:26.5.0.122743-community
    profiles:
      - quality
    container_name: cs-sonarqube
    restart: unless-stopped
    depends_on:
      sonar-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: sonarqube
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    stop_grace_period: 1h

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    profiles:
      - quality-scan
    container_name: cs-sonar-scanner
    depends_on:
      - sonarqube
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
      SONAR_SCANNER_JAVA_OPTS: -Xmx1024m
    volumes:
      - .:/usr/src
      - sonar-scanner-cache:/opt/sonar-scanner/.sonar

  sonar-coverage:
    image: maven:3.9.9-eclipse-temurin-21
    profiles:
      - quality-coverage
    container_name: cs-sonar-coverage
    working_dir: /workspace
    command: mvn clean verify -Pcoverage
    volumes:
      - .:/workspace
      - maven-repo:/root/.m2

  # ── Microservices ────────────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    container_name: cs-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cs_auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_SERVICES_POST_URL: http://post-service:8082
      APP_SERVICES_SEARCH_URL: http://search-service:8088
    depends_on:
      eureka-server:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  post-service:
    build:
      context: .
      dockerfile: ./post-service/Dockerfile
    container_name: cs-post
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cs_post_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_SERVICES_AUTH_SERVICE_URL: http://auth-service:8081
      APP_SERVICES_FOLLOW_SERVICE_URL: http://follow-service:8085
      APP_SERVICES_SEARCH_SERVICE_URL: http://search-service:8088
    depends_on:
      - eureka-server
      - mysql
      - redis
      - rabbitmq
      - auth-service

  comment-service:
    build:
      context: .
      dockerfile: ./comment-service/Dockerfile
    container_name: cs-comment
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cs_comment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_SERVICES_AUTH_SERVICE_URL: http://auth-service:8081
      APP_SERVICES_POST_SERVICE_URL: http://post-service:8082
    depends_on:
      - eureka-server
      - mysql
      - rabbitmq
      - post-service

  like-service:
    build:
      context: .
      dockerfile: ./like-service/Dockerfile
    container_name: cs-like
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cs_like_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_SERVICES_AUTH_SERVICE_URL: http://auth-service:8081
      APP_SERVICES_POST_SERVICE_URL: http://post-service:8082
      APP_SERVICES_COMMENT_SERVICE_URL: http://comment-service:8083
      APP_SERVICES_MEDIA_SERVICE_URL: http://media-service:8087
    depends_on:
      - eureka-server
      - mysql
      - rabbitmq
      - post-service
      - comment-service
      - media-service

  follow-service:
    build:
      context: .
      dockerfile: ./follow-service/Dockerfile
    container_name: cs-follow
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cs_follow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_SERVICES_AUTH_SERVICE_URL: http://auth-service:8081
      APP_SERVICES_NOTIFICATION_SERVICE_URL: http://notification-service:8086
    depends_on:
      - eureka-server
      - mysql
      - redis
      - rabbitmq

  notification-service:
    build:
      context: .
      dockerfile: ./notification-service/Dockerfile
    container_name: cs-notification
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cs_notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_SERVICES_AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      - eureka-server
      - mysql
      - redis
      - rabbitmq

  media-service:
    build:
      context: .
      dockerfile: ./media-service/Dockerfile
    container_name: cs-media
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cs_media_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_SERVICES_AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      - eureka-server
      - mysql
      - rabbitmq

  search-service:
    build:
      context: .
      dockerfile: ./search-service/Dockerfile
    container_name: cs-search
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cs_search_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_RABBITMQ_HOST: rabbitmq
      APP_SERVICES_AUTH_SERVICE_URL: http://auth-service:8081
      APP_SERVICES_FOLLOW_SERVICE_URL: http://follow-service:8085
      APP_SERVICES_POST_SERVICE_URL: http://post-service:8082
    depends_on:
      - eureka-server
      - mysql
      - elasticsearch
      - rabbitmq

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: cs-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      APP_SERVICES_AUTH_URL: http://auth-service:8081
      APP_SERVICES_POST_URL: http://post-service:8082
      APP_SERVICES_COMMENT_URL: http://comment-service:8083
      APP_SERVICES_LIKE_URL: http://like-service:8084
      APP_SERVICES_FOLLOW_URL: http://follow-service:8085
      APP_SERVICES_NOTIFICATION_URL: http://notification-service:8086
      APP_SERVICES_MEDIA_URL: http://media-service:8087
      APP_SERVICES_SEARCH_URL: http://search-service:8088
    depends_on:
      - eureka-server
      - auth-service
      - post-service
      - comment-service
      - like-service
      - follow-service
      - notification-service
      - media-service
      - search-service

  frontend:
    build:
      context: ./connectsphere-frontend
      dockerfile: Dockerfile
    profiles:
      - frontend
    container_name: cs-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  mysql-data:
  es-data:
  sonarqube-db-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  sonar-scanner-cache:
  maven-repo:
