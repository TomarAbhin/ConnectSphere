spring.application.name=api-gateway
server.port=8080

app.services.auth.url=http://localhost:8081
app.services.post.url=http://localhost:8082
app.services.comment.url=http://localhost:8083
app.services.like.url=http://localhost:8084
app.services.follow.url=http://localhost:8085
app.services.notification.url=http://localhost:8086
app.services.media.url=http://localhost:8087
app.services.search.url=http://localhost:8088

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${app.services.auth.url}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**,/api/v1/oauth2/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[1].id=post-service
spring.cloud.gateway.routes[1].uri=${app.services.post.url}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/posts/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[2].id=comment-service
spring.cloud.gateway.routes[2].uri=${app.services.comment.url}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/comments/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[3].id=like-service
spring.cloud.gateway.routes[3].uri=${app.services.like.url}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/likes/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[4].id=follow-service
spring.cloud.gateway.routes[4].uri=${app.services.follow.url}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/follows/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=${app.services.notification.url}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/notifications/**,/api/v1/reports/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[6].id=media-service
spring.cloud.gateway.routes[6].uri=${app.services.media.url}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/media/**,/api/v1/stories/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[7].id=search-service
spring.cloud.gateway.routes[7].uri=${app.services.search.url}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/search/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=2

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000,http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

management.endpoints.web.exposure.include=health,info