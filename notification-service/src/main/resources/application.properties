spring.application.name=notification-service
server.port=8086

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:mysql://localhost:3306/cs_notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=ConnectSphere_JWT_Secret_Key_Change_In_Prod_2026!

app.services.auth-service.url=${APP_SERVICES_AUTH_SERVICE_URL:http://localhost:8081}

management.endpoints.web.exposure.include=health,info
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
