services:
  - type: web
    name: connectsphere-backend
    runtime: docker
    dockerContext: ./connectsphere
    dockerfilePath: ./connectsphere/Dockerfile.render
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: JAVA_TOOL_OPTIONS
        value: -Xms16m -Xmx64m -XX:MaxMetaspaceSize=96m
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-vercel-app.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: CONNECTSPHERE_ADMIN_REGISTRATION_KEY
        sync: false
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_USERNAME
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: SPRING_RABBITMQ_HOST
        sync: false
      - key: SPRING_RABBITMQ_PORT
        value: 5672
      - key: SPRING_RABBITMQ_USERNAME
        sync: false
      - key: SPRING_RABBITMQ_PASSWORD
        sync: false
      - key: SPRING_ELASTICSEARCH_URIS
        sync: false
